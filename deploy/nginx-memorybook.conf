# Nginx configuration for Memorybook Creator AI
# This reverse proxies to the Node.js app running on localhost:3000
# Place this file at: /etc/nginx/sites-available/memorybook
# Then enable with: sudo ln -s /etc/nginx/sites-available/memorybook /etc/nginx/sites-enabled/memorybook

upstream memorybook_app {
  server 127.0.0.1:3000;
  keepalive 64;
}

# HTTP to HTTPS redirect
server {
  listen 80;
  listen [::]:80;
  server_name your-domain.com www.your-domain.com;

  # Allow Let's Encrypt verification
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all other traffic to HTTPS
  location / {
    return 308 https://$server_name$request_uri;
  }
}

# HTTPS server
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name your-domain.com www.your-domain.com;

  # SSL certificate paths (provisioned by Let's Encrypt via Certbot)
  ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Logging
  access_log /var/log/nginx/memorybook_access.log combined;
  error_log /var/log/nginx/memorybook_error.log warn;

  # Proxy settings
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;
  proxy_buffering off;

  # Per-endpoint upload limits aligned to backend multer limits.
  location = /api/files/upload {
    client_max_body_size 60M;
    proxy_pass http://memorybook_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  location = /api/video/convert {
    client_max_body_size 1024M;
    proxy_pass http://memorybook_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # Reverse proxy to Node.js app
  location / {
    proxy_pass http://memorybook_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # Static assets (browser caching)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://memorybook_app;
    proxy_cache_valid 200 7d;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  # Prevent access to sensitive files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
