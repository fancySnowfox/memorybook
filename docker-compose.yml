version: '3.8'

services:
  app:
    build: .
    container_name: memorybook-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      GRADIENT_API_KEY: ${GRADIENT_API_KEY}
      GRADIENT_BASE_URL: ${GRADIENT_BASE_URL:-https://inference.do-ai.run/v1}
      SESSION_SECRET: ${SESSION_SECRET}
      DEBUG_MODE: ${DEBUG_MODE:-false}
    volumes:
      - ./files:/app/files
      - ./uploads:/app/uploads
      - ./logs:/var/log/memorybook
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: memorybook-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-memorybook.conf:/etc/nginx/conf.d/memorybook.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped

volumes:
  nginx_logs:
    driver: local
